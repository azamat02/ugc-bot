version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ugc-bot-db
    environment:
      POSTGRES_USER: ugcbot
      POSTGRES_PASSWORD: ugcbot
      POSTGRES_DB: ugcbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
