services:
  postgres:
    image: postgres:16-alpine
    container_name: ugc-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ugcbot
      POSTGRES_PASSWORD: ugcbot
      POSTGRES_DB: ugcbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ugcbot"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: ugc-bot-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ugcbot:ugcbot@postgres:5432/ugcbot
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
